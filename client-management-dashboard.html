<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Management Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 980px;
      margin: 40px auto;
      padding: 24px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { color: #0f766e; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .card {
      background: #ecfeff;
      border: 1px solid #a7f3d0;
      padding: 16px;
      border-radius: 10px;
    }
    .card h3 { margin-top: 0; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 14px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Client Management Dashboard</h1>
    <p>This page is now restored and available in the website repository.</p>
    <div class="cards">
      <div class="card">
        <h3>Bookings</h3>
        <p>View and manage incoming booking requests.</p>
      </div>
      <div class="card">
        <h3>Clients</h3>
        <p>Access client information and communication history.</p>
      </div>
      <div class="card">
        <h3>Status</h3>
        <p>Track pending, confirmed, and completed requests.</p>
      </div>
    </div>
    <a class="btn" href="./Main page pc.html">Back to Home</a>
  </div>
</body>
</html>
